description:
  sv:
    shortDescription: Verktygskedja för publiccode.yml och DIS-Readiness
    longDescription: |-
      DIS-Tools är en samling verktyg för att hjälpa svenska myndigheter och kommuner att beskriva sina öppen källkod-projekt enligt publiccode.yml-standarden.

                  Verktygskedjan inkluderar:
                  - En visuell webbredigerare med steg-för-steg-guide
                  - Ett CLI-verktyg för validering och scoring
                  - En GitHub Action för automatisk kontroll
                  - Ett core-bibliotek för programmatisk användning
    features:
      - Visuell redigerare för publiccode.yml
      - DIS-Readiness Score (0-100 poäng)
      - Validering mot publiccode.yml-standarden
      - CLI-verktyg för automation
      - GitHub Action för CI/CD-integration
    localisedName: DIS-Tools

description:
  sv:
    shortDescription: Verktygskedja för publiccode.yml-standarden och SamhällsKodex-bedömning av öppen källkod i offentlig sektor
    longDescription: Komplett verktygskedja för att skapa, validera och bedöma publiccode.yml-filer enligt SamhällsKodex-standarden. Innehåller CLI-verktyg, kärnbibliotek, GitHub Action och webbredaktör för att hjälpa offentliga organisationer att dokumentera och bedöma sin programvara för DIS-kompatibilitet.
    features:
      - CLI-verktyg för att skapa och validera publiccode.yml
      - SamhällsKodex Score (0-100) baserat på DIS-kriterier
      - GitHub Action för automatisk validering
      - Webbredaktör för enkel redigering
      - Stöd för svenska lokaliseringar
      - Validering mot publiccode.yml-standarden

description:
  sv:
    shortDescription: Verktygskedja för publiccode.yml-standarden och SamhällsKodex-bedömning av öppen källkod i offentlig sektor
    longDescription: Omfattande verktygskedja för att skapa, validera och bedöma publiccode.yml-filer enligt SamhällsKodex-standarden. Inkluderar CLI-verktyg, kärnbibliotek, GitHub Actions och webbredigerare för att förbereda öppen källkod för DIS (Dynamiskt Inköpssystem).
    features:
      - Automatisk validering av publiccode.yml-filer
      - SamhällsKodex Score-beräkning (0-100 poäng)
      - CLI-verktyg för skapande och validering
      - GitHub Action för CI/CD-integration
      - Webbbaserad redigerare för publiccode.yml
      - Stöd för svenska lokaliseringar
      - DIS Fas 1-kategorisering

description:
  sv:
    shortDescription: Verktygskedja för publiccode.yml-standarden och SamhällsKodex-bedömning av öppen källkod i offentlig sektor
    longDescription: SamhällsKodex är en komplett verktygskedja för publiccode.yml-standarden som används för att beskriva öppen källkod i offentlig sektor. Innehåller CLI-verktyg, JavaScript-bibliotek, GitHub Action och webbgränssnitt för att validera, bedöma och skapa publiccode.yml-filer.
    features:
      - CLI-verktyg för att skapa och validera publiccode.yml
      - SamhällsKodex Score-bedömning (0-100 poäng) för DIS-readiness
      - JavaScript/TypeScript-bibliotek för integrering
      - GitHub Action för automatisk validering
      - Webbredaktör för enkel redigering
      - Stöd för svenska lokaliseringar
      - DIS Fas 1-kategorier för offentlig sektor

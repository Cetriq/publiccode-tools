description:
  sv:
    shortDescription: Verktygskedja för publiccode.yml och DIS-Readiness
    longDescription: |
      Publiccode Tools är en svensk verktygslåda för att skapa, validera och publicera publiccode.yml-filer enligt den internationella standarden.
        Systemet hjälper offentliga organisationer och myndigheter att enkelt dokumentera sina öppna källkodsprojekt på ett strukturerat sätt. Med inbyggd
        DIS-Readiness-poängsättning får du direkt feedback på hur väl din dokumentation uppfyller svenska krav för digital informationssamverkan. Verktyget
         stödjer alla 117 standardkategorier, erbjuder realtidsvalidering mot JSON-schema, och genererar YAML-filer som kan läggas direkt i ditt kodarkiv.
        Katalogfunktionen ger överblick över registrerade projekt och underlättar återanvändning av öppen programvara inom offentlig sektor.
    features:
      - En visuell webbredigerare med steg-för-steg-guide
      - Ett CLI-verktyg för validering och scoring
      - En GitHub Action för automatisk kontroll
      - Ett core-bibliotek för programmatisk användning

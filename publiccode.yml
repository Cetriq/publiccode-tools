description:
  sv:
    localisedName: DIS-Tools
    shortDescription: Verktyg för att skapa, validera och analysera publiccode.yml-filer för svenska OSS-projekt
    longDescription: |
      DIS-Tools är en samling verktyg för att hjälpa svenska myndigheter och kommuner
      att beskriva sina öppen källkod-projekt enligt publiccode.yml-standarden.

      Verktygskedjan inkluderar:
      - En visuell webbredigerare med steg-för-steg-guide
      - Ett CLI-verktyg för validering och scoring
      - En GitHub Action för automatisk kontroll
      - Ett core-bibliotek för programmatisk användning

      DIS-Readiness Score hjälper er att mäta och förbättra kvaliteten på era
      projektbeskrivningar, med särskilt fokus på svenska offentliga sektorns behov.
    features:
      - Visuell redigerare för publiccode.yml
      - DIS-Readiness Score (0-100 poäng)
      - Validering mot publiccode.yml-standarden
      - Stöd för svenska tillägg (sv-extension)
      - 52 kategorier med svenska beskrivningar
      - CLI-verktyg för automation
      - GitHub Action för CI/CD-integration
  en:
    shortDescription: Tools for creating, validating and analyzing publiccode.yml files for Swedish OSS projects
    longDescription: |
      DIS-Tools is a collection of tools to help Swedish government agencies and municipalities
      describe their open source projects according to the publiccode.yml standard.

      The toolchain includes:
      - A visual web editor with step-by-step guide
      - A CLI tool for validation and scoring
      - A GitHub Action for automated checks
      - A core library for programmatic use

      The DIS-Readiness Score helps you measure and improve the quality of your
      project descriptions, with special focus on Swedish public sector needs.
    features:
      - Visual editor for publiccode.yml
      - DIS-Readiness Score (0-100 points)
      - Validation against publiccode.yml standard
      - Support for Swedish extensions (sv-extension)
      - 52 categories with Swedish descriptions
      - CLI tool for automation
      - GitHub Action for CI/CD integration

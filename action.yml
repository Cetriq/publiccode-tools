name: 'DIS publiccode.yml Validator'
description: 'Validera och poängsätt publiccode.yml enligt DIS-standarden för öppen källkod i offentlig sektor'
author: 'Cetriq'

branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  path:
    description: 'Sökväg till publiccode.yml'
    required: false
    default: './publiccode.yml'

  fail-on-warnings:
    description: 'Misslyckas om varningar hittas'
    required: false
    default: 'false'

  min-score:
    description: 'Minsta godkända DIS-Readiness Score (0-100)'
    required: false
    default: '0'

  annotate:
    description: 'Skapa PR-annotationer för fel och varningar'
    required: false
    default: 'true'

  lang:
    description: 'Språk för meddelanden (sv/en)'
    required: false
    default: 'sv'

  register:
    description: 'Registrera i DIS-katalogen om score >= 60'
    required: false
    default: 'false'

  registry-api-key:
    description: 'API-nyckel för registrering i DIS-katalogen'
    required: false
    default: ''

  registry-url:
    description: 'URL till registry API'
    required: false
    default: 'https://publiccode.dis.tools/api/registry'

outputs:
  valid:
    description: 'true om filen är giltig'

  score:
    description: 'DIS-Readiness Score (0-100)'

  errors:
    description: 'Antal valideringsfel'

  warnings:
    description: 'Antal varningar'

  registered:
    description: 'true om repot registrerades i katalogen'

runs:
  using: 'node20'
  main: 'dist/index.js'
